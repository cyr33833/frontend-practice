<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌摆 · 流星拖尾 + 手动加速</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(8,8,25,0.7);
            color: #ddd;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            backdrop-filter: blur(10px);
            background: rgba(8,8,25,0.55);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        button {
            background: rgba(255,255,255,0.06);
            color: #b0d0ff;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 9px 20px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
        }
        button:hover {
            background: rgba(255,255,255,0.18);
            border-color: #ff7b24;
            color: #fff;
            box-shadow: 0 0 18px rgba(255,120,30,0.5);
        }
        .value { color: #ff9f4b; font-weight: bold; text-shadow: 0 0 10px rgba(255,140,0,0.7); }
        .speed-indicator { color: #ffcc80; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <div>θ₁ = <span id="th1" class="value">0.00</span> rad</div>
        <div>θ₂ = <span id="th2" class="value">0.00</span> rad</div>
        <div>ω₁ = <span id="w1" class="value">0.00</span> rad/s</div>
        <div>ω₂ = <span id="w2" class="value">0.00</span> rad/s</div>
        <div>总能量 = <span id="te" class="value">0.00</span> J</div>
        <div style="font-size:12px; color:#aaa;">
            动画速度：<span id="speedDisplay" class="speed-indicator">0.4x</span>
        </div>
    </div>
    <div class="controls">
        <button onclick="resetHighEnergy()">💥 高能重置</button>
        <button onclick="kickBall()">⚡ 踹一脚 (+5)</button>
        <button onclick="tinyNudge()">🌀 混沌扰动</button>
        <button onclick="slowDown()">🐢 更慢</button>
        <button onclick="speedUp()">🐇 更快</button>
        <button onclick="toggleTrail()">✨ 流星拖尾</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ---------- 物理参数 ----------
            const g = 9.81;
            const L1 = 0.8, m1 = 0.3, I1 = (1/12) * m1 * L1 * L1;
            const L2 = 0.6, m2 = 0.2, I2 = (1/12) * m2 * L2 * L2;
            const mb = 0.3;  // 小球质量

            const a3 = I1 + (m1/4 + m2 + mb) * L1 * L1;
            const a4 = (m2/2 + mb) * L1 * L2;
            const a5 = I2 + (m2/4 + mb) * L2 * L2;
            const a6 = (m1/2 + m2 + mb) * g * L1;
            const a7 = (m2/2 + mb) * g * L2;

            let theta1 = 0.0, theta2 = 0.0;
            let omega1 = 9.0, omega2 = -14.0;   // 极高初速度
            let timeSpeed = 0.4;
            const dt = 0.0002, stepsPerFrame = 12;

            // 拖尾控制
            let showTrail = true;
            const maxTrailPoints = 400;
            let trailPoints = [];   // 存储 {x, y, life} 生命周期 0~1

            // ---------- 运动方程 ----------
            function derivatives(th1, th2, w1, w2) {
                const d12 = th1 - th2, sinD = Math.sin(d12), cosD = Math.cos(d12);
                const M11 = a3, M12 = a4 * cosD, M21 = a4 * cosD, M22 = a5;
                const det = M11 * M22 - M12 * M21;
                const R1 = -a4 * w2 * w2 * sinD - a6 * Math.sin(th1);
                const R2 =  a4 * w1 * w1 * sinD - a7 * Math.sin(th2);
                return [w1, w2,
                        (R1 * M22 - R2 * M12) / det,
                        (M11 * R2 - M21 * R1) / det];
            }

            function rk4Step(th1, th2, w1, w2, h) {
                const [a,b,c,d] = derivatives(th1, th2, w1, w2);
                const [e,f,g,h1] = derivatives(th1+0.5*h*a, th2+0.5*h*b, w1+0.5*h*c, w2+0.5*h*d);
                const [i,j,k,l] = derivatives(th1+0.5*h*e, th2+0.5*h*f, w1+0.5*h*g, w2+0.5*h*h1);
                const [m,n,o,p] = derivatives(th1+h*i, th2+h*j, w1+h*k, w2+h*l);
                return [
                    th1 + (h/6)*(a+2*e+2*i+m),
                    th2 + (h/6)*(b+2*f+2*j+n),
                    w1  + (h/6)*(c+2*g+2*k+o),
                    w2  + (h/6)*(d+2*h1+2*l+p)
                ];
            }

            function computeEnergy(th1, th2, w1, w2) {
                const cosD = Math.cos(th1 - th2);
                const y1_cm = (L1/2)*Math.cos(th1);
                const y_joint = L1*Math.cos(th1);
                const y2_cm = y_joint + (L2/2)*Math.cos(th2);
                const y_ball = y_joint + L2*Math.cos(th2);
                const PE = -m1*g*y1_cm - m2*g*y2_cm - mb*g*y_ball;
                const v1cm2 = (L1/2 * w1) ** 2;
                const v2cm2 = (L1*w1)**2 + (L2/2*w2)**2 + 2*L1*(L2/2)*w1*w2*cosD;
                const vball2 = (L1*w1)**2 + (L2*w2)**2 + 2*L1*L2*w1*w2*cosD;
                const KE = 0.5*m1*v1cm2 + 0.5*I1*w1*w1
                        + 0.5*m2*v2cm2 + 0.5*I2*w2*w2
                        + 0.5*mb*vball2;
                return KE + PE;
            }

            // ---------- 按钮操作 ----------
            window.resetHighEnergy = () => {
                theta1 = 0; theta2 = 0;
                omega1 = 9.0; omega2 = -14.0;
                trailPoints = [];
            };
            window.kickBall = () => {
                omega2 += 5.0;   // 直接增加下杆角速度
                // 同时稍微扰动上杆，增加混沌
                omega1 += (Math.random() - 0.5) * 0.5;
            };
            window.tinyNudge = () => { theta2 += 0.001; };
            window.slowDown = () => {
                timeSpeed = Math.max(0.1, timeSpeed - 0.1);
                document.getElementById('speedDisplay').textContent = timeSpeed.toFixed(1) + 'x';
            };
            window.speedUp = () => {
                timeSpeed = Math.min(5.0, timeSpeed + 0.1);   // 上限提到 5x
                document.getElementById('speedDisplay').textContent = timeSpeed.toFixed(1) + 'x';
            };
            window.toggleTrail = () => {
                showTrail = !showTrail;
            };

            // ---------- 画布 ----------
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const pivotX = () => canvas.width / 2;
            const pivotY = () => canvas.height * 0.22;
            const scale = () => Math.min(canvas.width, canvas.height) * 0.42;
            function toScreen(x, y) { return [pivotX() + x * scale(), pivotY() + y * scale()]; }

            // 绘制流星粒子拖尾
            function drawMeteorTrail() {
                if (!showTrail || trailPoints.length < 2) return;
                ctx.save();
                for (let i = 0; i < trailPoints.length; i++) {
                    const pt = trailPoints[i];
                    const life = pt.life;
                    if (life <= 0.01) continue;
                    // 半径随生命周期增大（末端大），透明度随life变化
                    const radius = 1.5 + life * 3.5;
                    const alpha = life * 0.85;
                    // 中心亮斑
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 180, 50, ${alpha})`;
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = radius * 4;
                    ctx.fill();
                    // 内核
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, radius * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 1.2})`;
                    ctx.shadowBlur = radius * 2;
                    ctx.fill();
                }
                ctx.restore();
            }

            // ---------- 动画循环 ----------
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 物理更新
                for (let i = 0; i < stepsPerFrame; i++) {
                    [theta1, theta2, omega1, omega2] = rk4Step(theta1, theta2, omega1, omega2, dt);
                }

                const energy = computeEnergy(theta1, theta2, omega1, omega2);
                document.getElementById('th1').textContent = theta1.toFixed(3);
                document.getElementById('th2').textContent = theta2.toFixed(3);
                document.getElementById('w1').textContent = omega1.toFixed(3);
                document.getElementById('w2').textContent = omega2.toFixed(3);
                document.getElementById('te').textContent = energy.toFixed(3);
                document.getElementById('speedDisplay').textContent = timeSpeed.toFixed(1) + 'x';

                // 位置
                const x1j = L1 * Math.sin(theta1), y1j = L1 * Math.cos(theta1);
                const x2e = x1j + L2 * Math.sin(theta2), y2e = y1j + L2 * Math.cos(theta2);
                const [px1j, py1j] = toScreen(x1j, y1j);
                const [px2e, py2e] = toScreen(x2e, y2e);
                const [p0x, p0y] = toScreen(0, 0);

                // 更新拖尾点（生命周期递减）
                // 新点生命为1，每帧衰减
                const decay = 0.02; // 衰减速度
                trailPoints.forEach(pt => pt.life -= decay);
                // 移除死点
                trailPoints = trailPoints.filter(pt => pt.life > 0.01);
                // 添加新点
                trailPoints.push({ x: px2e, y: py2e, life: 1.0 });
                // 限制长度
                if (trailPoints.length > maxTrailPoints) {
                    trailPoints = trailPoints.slice(-maxTrailPoints);
                }

                // 先绘制流星拖尾（在杆下方）
                drawMeteorTrail();

                // 绘制杆子
                ctx.lineCap = 'round';
                // 上杆
                ctx.beginPath(); ctx.moveTo(p0x, p0y); ctx.lineTo(px1j, py1j);
                ctx.strokeStyle = '#b8956a'; ctx.lineWidth = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                // 下杆
                ctx.beginPath(); ctx.moveTo(px1j, py1j); ctx.lineTo(px2e, py2e);
                ctx.strokeStyle = '#b8956a'; ctx.lineWidth = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6;
                ctx.stroke();
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

                // 关节
                ctx.beginPath(); ctx.arc(p0x, p0y, 6, 0, 2*Math.PI); ctx.fillStyle = '#ddd'; ctx.fill();
                ctx.beginPath(); ctx.arc(px1j, py1j, 5, 0, 2*Math.PI); ctx.fillStyle = '#bbb'; ctx.fill();

                // 末端小球（发光）
                ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 25;
                ctx.beginPath(); ctx.arc(px2e, py2e, 10, 0, 2*Math.PI);
                ctx.fillStyle = '#ff8c3a'; ctx.fill();
                ctx.shadowBlur = 12;
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

                // 速度箭头
                const vx = L1*omega1*Math.cos(theta1) + L2*omega2*Math.cos(theta2);
                const vy = -L1*omega1*Math.sin(theta1) - L2*omega2*Math.sin(theta2);
                const speed = Math.sqrt(vx*vx + vy*vy);
                if (speed > 0.5) {
                    const arrowLen = Math.min(30, 25 / speed);
                    ctx.beginPath(); ctx.moveTo(px2e, py2e);
                    ctx.lineTo(px2e + vx*arrowLen, py2e - vy*arrowLen);
                    ctx.strokeStyle = '#ffd966'; ctx.lineWidth = 2.5;
                    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                }

                setTimeout(() => requestAnimationFrame(draw), 1000 / 60 / timeSpeed);
            }

            requestAnimationFrame(draw);
        })();
    </script>
</body>
</html>
