<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>
    

    <style>
        .box {
            display: inline-block;
            width: 200px;
            height: 100px;
            background-color: rgb(199, 202, 188);
            border: 10px solid rgb(74, 74, 71);
            padding: 20px;
            margin: 30px;
        }
        .border-box{
            background-color: rgb(165, 202, 33);
            width: 200px;
            height: 100px;
            border-style: solid dashed dotted double;
            border-width:10px 20px 30px 40px;
            border-color: rgb(23, 23, 22);
        }
    </style>
</head>
<body>
    <div class="box">这是一个盒子</div>
    <div class="border-box">这是一个边框示例</div>
</body>
</html>
